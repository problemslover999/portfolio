<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Admission Form</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:rgb(22, 3, 237);
    padding:20px;
}

.top-bar{
    display:flex;
    justify-content:flex-start;
    margin-bottom:20px;
}

.back-button{
    text-decoration:none;
    color:white;
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:18px;
    background:#5007ed;
    padding:10px 14px;
    border-radius:8px;
}

.page-title{
    color:white;
    text-align:center;
    margin:20px 0;
}

.container{
    max-width:1200px;
    margin:auto;
    background:rgb(6, 175, 232);
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    margin-bottom:20px;
    color:#333;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:5px;
    font-weight:bold;
}

input,
select,
textarea{
    padding:10px;
    border:1px solid #d80505;
    border-radius:5px;
}

textarea{
    resize:none;
}

.full{
    grid-column:1/3;
}

.btn{
    margin-top:20px;
    margin-left:auto;
    margin-right:auto;
    display:block;
    background:#d6f105;
    color:rgb(0, 9, 3);
    border:none;
    padding:12px;
    cursor:pointer;
    border-radius:5px;
    width:auto;
    font-size:16px;
}

.btn:hover{
    background:#0678bb;
}

</style>
</head>
<body>
<div class="top-bar">
    <a href="myproject.html" class="back-button">← Back</a>
</div>
<div style="text-align:right;">
    <a href="index.html" style="text-decoration:none; display:inline-block;">
     <button type="button" style="background-color:#5007ed; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">
        Home
          </button>
             </a>
</div>

<body>

<div class="container">

<h2>🎓 College Student Admission Form</h2>

<form id="admissionForm">

<div class="form-grid">

<div class="form-group">
<label>Admission Date</label>
<input type="date" id="date" required>
</div>

<div class="form-group">
<label>Admission No</label>
<input type="text" id="admissionNo" required>
</div>

<div class="form-group">
<label>Student Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Gender</label>
<select id="gender">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" id="dob">
</div>

<div class="form-group">
<label>Mobile Number</label>
<input type="tel" id="mobile">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="form-group">
<label>Course</label>
<select id="course">
<option>BCA</option>
<option>BBA</option>
<option>B.Com</option>
<option>BA</option>
<option>B.Sc</option>
<option>MCA</option>
</select>
</div>

<div class="form-group">
<label>Semester</label>
<select id="semester">
<option>1st</option>
<option>2nd</option>
<option>3rd</option>
<option>4th</option>
<option>5th</option>
<option>6th</option>
</select>
</div>

<div class="form-group">
<label>State</label>
<input type="text" id="state">
</div>

<div class="form-group full">
<label>Address</label>
<textarea id="address" rows="3"></textarea>
</div>

<div class="form-group">
<label>Guardian Name</label>
<input type="text" id="guardian">
</div>

<div class="form-group">
<label>Guardian Mobile</label>
<input type="tel" id="guardianMobile">
</div>


<div style="text-align:center"><button type="submit" class="btn">
Submit Admission
</button></div>

</form>

</div>

<script>

document.getElementById("admissionForm")
.addEventListener("submit", function(e){

e.preventDefault();

let student = {
    admissionDate: document.getElementById("date").value,
    admissionNo: document.getElementById("admissionNo").value,
    name: document.getElementById("name").value,
    gender: document.getElementById("gender").value,
    dob: document.getElementById("dob").value,
    mobile: document.getElementById("mobile").value,
    email: document.getElementById("email").value,
    course: document.getElementById("course").value,
    semester: document.getElementById("semester").value,
    state: document.getElementById("state").value,
    address: document.getElementById("address").value,
    guardian: document.getElementById("guardian").value,
    guardianMobile: document.getElementById("guardianMobile").value
};

let students =
JSON.parse(localStorage.getItem("students")) || [];

students.push(student);

localStorage.setItem(
    "students",
    JSON.stringify(students)
);

alert("Admission Successfully Saved!");

document.getElementById("admissionForm").reset();

console.log(
JSON.parse(localStorage.getItem("students"))
);

});

</script>

</body>
</html>
