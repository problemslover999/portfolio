<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apna Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <div class="logo">🛒 Apna Store</div>

        <div class="search-box">
            <input type="text" placeholder="Search for products..." style="margin-right:10px;">
            <button style="margin-right:10px;">🔍</button>
            
            <a href="index.html" style="text-decoration:none; display:inline-block;">
                <button type="button" style="background-color:#5007ed; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">
                    Home
                </button>
            </a>
        </div>

        <div class="nav-links">
            <a href="#">Login</a>
            <a href="#">Cart 🛍️</a>
        </div>
    </header>

    <!-- Hero Banner -->
    <section class="hero">
        <div class="slider">
           <div class="hero-content">
            <h1>Big Summer Sale</h1>
            <p>Up to 90% OFF on Electronics, Fashion & More</p>
            <button>Shop Now</button>
        </div>
    </section>

    <!-- Categories -->
   
    <section class="categories" style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; padding:20px;">
        <div class="category" style="background:#ffcc00; color:#000; padding:18px 24px; border-radius:14px;">📱 Mobiles</div>
        <div class="category" style="background:#4f46e5; color:#fff; padding:18px 24px; border-radius:14px;">💻 Laptops</div>
        <div class="category" style="background:#ec4899; color:#fff; padding:18px 24px; border-radius:14px;">👕 Fashion</div>
        <div class="category" style="background:#0ea5e9; color:#fff; padding:18px 24px; border-radius:14px;">⌚ Watches</div>
        <div class="category" style="background:#22c55e; color:#fff; padding:18px 24px; border-radius:14px;">🎧 Headphones</div>
        <div class="category" style="background:#fb7185; color:#fff; padding:18px 24px; border-radius:14px;">🏠 Home</div>
    </section>

    <!-- Products -->
    <section class="products">
        <h2 style="color:white">Trending Products
            <strong>🔥</strong>
        </h2>

        <div class="product-grid">

            <div class="card">
                <img src="./image1.png" width="50" height="250" alt="Smart Phone">
                <h3>Smart Phone</h3>
                <p>₹50,000</p>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="./image 2.png" width="100" height="250" alt="Laptop">
                <h3>Laptop</h3>
                <p>₹100,000</p>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="./image 3.png" width="100" height="250" alt="Headphones">
                <h3>Headphones</h3>
                <p>₹1,999</p>
                <button>Buy Now</button>
            </div>

            <div class="card">
                <img src="./image4.png" width="100" height="250" alt="Smart Watch">
                <h3>Smart Watch</h3>
                <p>₹3,000</p>
                <button>Buy Now</button>
            </div>

        </div>
    </section>

</body>
</html>
